<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Movie</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#e50914;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

img{
    display:block;
    margin:10px auto;
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

button{
    width:100%;
    background:#e50914;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c40812;
}
</style>
</head>

<body>

<div class="container">
    <h2>Edit Movie</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Movie Name -->
        <div class="form-group">
            <label>Movie Name</label>
            <input type="text" name="name" value="{{ movie.name }}" required>
        </div>

        <!-- Current Image -->
        <div class="form-group">
            <label>Current Image</label>
            <img src="{{ movie.image.url }}" alt="Movie Image">
        </div>

        <!-- New Image -->
        <div class="form-group">
            <label>Change Image</label>
            <input type="file" name="image" accept="image/*">
        </div>
        <div class="form-group">
            <label>Genre</label>
            <input type="text" name="genre" value="{{ movie.genre }}" required>
        </div>

        <div class="form-group">
            <label>Duration</label>
            <input type="text" name="duration" value="{{ movie.duration }}" placeholder="2h 30m" required>
        </div>
         {% if movie.video %}
        <div class="form-group">
            <label>Current Trailer</label>
            <video controls>
                <source src="{{ movie.video.url }}">
            </video>
        </div>
        {% endif %}

        <div class="form-group">
            <label>Change Trailer Video</label>
            <input type="file" name="video" accept="video/*">
        </div>
        <button type="submit">Update Movie</button>
    </form>
</div>

</body>
</html>
